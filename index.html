<html>
<head>
  <title>barkeeper</title>
  <meta name="description" content="barkeeper is a simple tool to manage bar programs. Proudly coded by hand without LLMs - I have no idea what I'm doing and am well capable of generating my own tech debt!">
  <meta name="author" content="couchsofa">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 16 16'><text x='0' y='14'>🥃</text></svg>" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.store('barkeeper', {
        data: {
          cocktails: [],
          ingredients: [],
          events: [],
          prepMethods: [],
        },

        charts: {},

        palette: {
          'Neutral':          'e9ecef',
          'Forest Moss':      '669900',
          'Lime Cream':       'ccee66',
          'Baltic Blue':      '006699',
          'Blue Bell':        '3399cc',
          'Raspberry Plum':   'cc3399',
          'Blaze Orange':     'ff6600',
          'Bright Amber':     'ffcc00',
          'Atomic Tangerine': 'f9844a',
          'Willow Green':     '90be6d',
          'Seaweed':          '43aa8b',
          'Dark Cyan':        '4d908e',
          'Blue Slate':       '577590',
          'Cerulean':         '277da1'
        },

        // Utilities
        formatNumber(num) {
          const options = {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          };
          return (num).toLocaleString('de-DE', options);
        },

        formatCurrency(num) {
          const formatter = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' });
          return formatter.format(num);
        },

        // Persistence
        export() {
          var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.data));
          var downloadAnchorNode = document.createElement('a');
          downloadAnchorNode.setAttribute("href",     dataStr);
          downloadAnchorNode.setAttribute("download", "barkeeper.json");
          document.body.appendChild(downloadAnchorNode); // required for firefox
          downloadAnchorNode.click();
          downloadAnchorNode.remove();
        },

        import() {
          var fileInput = document.getElementById('import');
          fileInput.click();

          fileInput.onchange = () => {
            var fr = new FileReader();
            fr.onload = (e) => { 
              this.data = JSON.parse(e.target.result);
              window.location.reload(); // reactivity breaks here, reload fixes it 🤷
            };
            fr.readAsText(fileInput.files.item(0));
          };
        },

        // Events
        addEvent(name) {
          this.data.events.push({
            id: self.crypto.randomUUID(),
            name: name,
            barProgram: {
              ice: {
                cubeSize: 25,
                cubeBagWeight: 4,
                cubeBagCost: 0,
                scoopSize: 150,
                crushedBagWeight: 4,
                crushedBagCost: 0,
                largeCubeSize: 50,
                largeCubeCost: 0,
              },
              equipment: [],
            },
          });
        },

        getEvent(id) {
          return this.data.events.find((e) => e.id === id);
        },

        removeEvent(id) {
          this.data.events = this.data.events.filter((e) => e.id !== id);
          this.data.cocktails.forEach((c) => {
            if (c.event === id) { c.event = 'null' }
          });
        },

        // bar program
        getNumCubes(id) {
          const cocktails = this.data.cocktails.filter((c) => c.event = id);
          if (!cocktails) {return 0};

          return cocktails.reduce((sum, c) => sum + +c.cubes * +c.numToPrep, 0 );
        },

        getCubeWeight(id) {
          const event = this.getEvent(id);

          const numCubes = this.getNumCubes(id);
          const cubeSize = event.barProgram.ice.cubeSize;
          const density = 0.917;

          return numCubes*(cubeSize/10)**3*density/1000;
        },

        getNumScoops(id) {
          const cocktails = this.data.cocktails.filter((c) => c.event = id);
          if (!cocktails) {return 0};

          return cocktails.reduce((sum, c) => sum + c.crushed * c.numToPrep, 0 );
        },

        getCrushedWeight(id) {
          const event = this.getEvent(id);

          const numScoops = this.getNumScoops(id);
          const scoopSize = event.barProgram.ice.scoopSize;

          return numScoops*scoopSize/1000;
        },

        getNumLargeCubes(id) {
          const cocktails = this.data.cocktails.filter((c) => c.event = id);
          if (!cocktails) {return 0};

          return cocktails.reduce((sum, c) => sum + c.largeCubes * c.numToPrep, 0 );
        },

        getLargeCubeWeight(id) {
          const event = this.getEvent(id);

          const numCubes = this.getNumLargeCubes(id);
          const cubeSize = event.barProgram.ice.largeCubeSize;
          const density = 0.917;

          return numCubes*(cubeSize/10)**3*density/1000;
        },

        // Prep Methods
        removePrepMethod(method) {
          this.data.prepMethods = this.data.prepMethods.filter((e) => e !== method);
          this.data.cocktails.forEach((c) => {
            if (c.method === method) { c.method = '' }
          });
        },

        // Ingredients
        addIngredient(name) {
          this.data.ingredients.unshift({
            id: self.crypto.randomUUID(),
            name: name,
            baseUnit: 'ml',
            units: [],
            ingredients: [],
            yield: 0,
            sources: [],
            allergens: '',
            vegan: '',
            notes: '',
            safetyFactor: 0.1,
            abv: 0,
            color: 'Neutral',
          });
        },

        removeIngredient(id) {
          this.data.ingredients = this.data.ingredients.filter((e) => e.id !== id);
          
          // remove refs from ingredients that have recipes
          this.data.ingredients.forEach((e) => {
            e.ingredients = e.ingredients.filter((i) => i.id !== id);
          });

          // remove refs from cocktails
          this.data.cocktails.forEach((e) => {
            e.ingredients = e.ingredients.filter((i) => i.id !== id);
          });
        },

        searchIngredient(searchString, excludeIdsArray = []) {
          return this.data.ingredients
            .filter((e) => ! excludeIdsArray.includes(e.id))
            .filter((e) => e.name.toLowerCase().includes(searchString.toLowerCase()));
        },

        // return an array of allowed units for an ingredient (including the base unit)
        getIngredientUnits(id) {
          const i = this.data.ingredients.find((e) => e.id === id);
          return [...i.units.flatMap((e) => e[0]), i.baseUnit];
        },

        getIngredient(id) {
          return this.data.ingredients.find((e) => e.id === id);
        },

        // Cocktails
        removeCocktail(id) {
          this.data.cocktails = this.data.cocktails.filter((e) => e.id !== id);
        },

        addCocktail(name, event = 'null') {
          this.data.cocktails.unshift({
            id: self.crypto.randomUUID(),
            name: name,
            ingredients: [],
            garnishes: [],
            notes: '',
            cubes: 0,
            crushed: 0,
            largeCubes: 0,
            method: '',
            event: event,
            numToPrep: 0,
            price: 0,
          });
        },

        // accepts a recipe entry
        // and applys safetyFactor, unitConversion
        // and adjusts for yield if it's a recipe
        applyUnitConversion(recipe_entry) {
          let ingredient = this.getIngredient(recipe_entry.id);
          if (!ingredient) {return;};

          // Alpine.raw() only works on surface level, we need a deep copy here
          ingredient = JSON.parse(JSON.stringify(this.getIngredient(recipe_entry.id)));
          
          // convert amount to base unit and apply safety factor
          let conversionFactor = 1.0;
          let safetyFactor     = ingredient.safetyFactor;

          if (recipe_entry.unit !== ingredient.baseUnit) {
            const unitConvTableEntry = ingredient.units.find((e) => e[0] === recipe_entry.unit);
            if(unitConvTableEntry) {
              conversionFactor = unitConvTableEntry[1];
            }
          };

          recipe_entry.color      = ingredient.color;
          recipe_entry.amount     = recipe_entry.amount * conversionFactor * (1 + +safetyFactor);
          recipe_entry.unit       = ingredient.baseUnit;
          recipe_entry.name       = ingredient.name;
          recipe_entry.notes      = ingredient.notes;

          // apply conversions to recipe
          if (ingredient.ingredients.length !== 0) {
            // jump one level up and adjust amounts for yield
            ingredient.ingredients.forEach((e, index) => {
              ingredient.ingredients[index].amount = (e.amount / ingredient.yield) * recipe_entry.amount * conversionFactor;
            });
          };

          return { entry: recipe_entry, recipe: ingredient };_
        },

        // flatten the recipe array, apply unit conversion and safety factor to make a shallow recipe
        assembleRecipe(recipe) {
          recipe.forEach((entry, index) => {
            const converted = this.applyUnitConversion(entry);
            if (!converted) { return; };

            let _recipe = converted.recipe;
            entry = converted.entry;

            // if _recipe contains ingredients (e.g. is a recipe)
            // recursivly call assembleRecipe 
            if (_recipe.ingredients.length !== 0) {
              // remove the recipe and insert ingredients
              _recipe.amount     = entry.amount;
              recipe[index] = this.assembleRecipe(_recipe.ingredients);

              // add info about the recipe
              recipe[index].recipe_info = {
                id:         entry.id,
                name:       this.getIngredient(entry.id).name,
                amount:     entry.amount,
                color:      entry.color,
                unit:       entry.unit,
                notes:      entry.notes,
              };
            };
          });
          return recipe;
        },

        calcCocktailCost(id, min_n = 50, max_n = 200) {
          let cocktail = this.data.cocktails.find((e) => e.id === id);
          if (!cocktail) {return};

          let ingredients = JSON.parse(JSON.stringify(cocktail.ingredients.concat(cocktail.garnishes)));

          if (ingredients.length === 0) { return [['', 0]] };
          
          // build recipe
          recipe = this.assembleRecipe(ingredients);

          // flatten, deduplicate and sum
          let summedRecipe = [];
          recipe = Object.groupBy(recipe.flat(Infinity), ({id}) => id);
          Object.entries(recipe).forEach((e) => {
            summedRecipe.push(
              {
                id:     e[0],
                unit:   e[1][0].unit,
                amount: e[1].reduce((acc, {amount}) => acc + +amount, 0),
              }
            );
          });

          // calculate costdistribution
          let costDistribution = [];
          for (var n = min_n; n <= max_n; n++) {
            let costSum = 0;

            summedRecipe.forEach((ingredient) => {
              const _ingredient = this.getIngredient(ingredient.id);
              if (!_ingredient) { return; };

              const sources = _ingredient.sources;
              const costPerSource = [];
              sources.forEach((source) => {
                costPerSource.push(Math.ceil((ingredient.amount*n)/source.size)*source.price);
              });
              costSum += Math.min(...costPerSource);
            });

            costDistribution.push([n, costSum/n || 0]);
          };

          return costDistribution;
        },

        createCocktailCostChart(container, dataset) {
          if (!dataset) {return};

          const DE = d3.formatDefaultLocale({
            thousands: '.',
            decimal: ',',
            currency: ['', ' €'],
          });

          // reset
          container.innerHTML = '';

          // layout
          const width = container.offsetWidth;
          const height = container.offsetHeight;
          const marginTop = 20;
          const marginRight = 40;
          const marginBottom = 20;
          const marginLeft = 50;

          // data range
          const min_n = dataset[0][0];
          const max_n = dataset[dataset.length-1][0];

          // find min and max y (cost) value
          const max_cost = dataset.reduce((prev, cur) => (cur[1] > prev[1] ? cur : prev))[1] + +0.05;
          const min_cost = dataset.reduce((prev, cur) => (cur[1] < prev[1] ? cur : prev))[1] - +0.05;

          // line generator
          const line = d3.line()
            .x(d => x(d[0]))
            .y(d => y(d[1]));

          // x (horizontal) scale
          const x = d3.scaleLinear()
              .domain([min_n, max_n])
              .range([marginLeft, width - marginRight]);

          // y (vertical) scale
          const y = d3.scaleLinear()
              .domain([min_cost, max_cost])
              .range([height - marginBottom, marginTop]);
          
          // create svg container
          //var svg = d3.create("svg")
          var svg = d3.select(container).append('svg')
            .attr('width', '100%')
            .attr('height', '100%')
            .attr('viewBox','0 0 ' + width + ' ' + height)
            .attr('preserveAspectRatio','xMinYMin');

          // add x-axis
          svg.append('g')
            .attr('class', 'axis')
            .attr('transform', 'translate(0,' + (height - marginBottom) + ')')
            .call(d3.axisBottom(x));

          // add the y-axis, remove domain line, add grid lines
          svg.append('g')
            .attr('class', 'axis')
            .attr('transform', 'translate('+ marginLeft + ',0)')
            .call(d3.axisLeft(y).tickFormat(DE.format('$.2f')))
            .call(g => g.select('.domain').remove())
            .call(g => g.selectAll('.tick line').clone()
            .attr('x2', width - marginLeft - marginRight)
            .attr('stroke-opacity', 0.3));

          // add data line
          svg.append('path')
            .attr('fill', 'none')
            .attr('stroke', 'steelblue')
            .attr('stroke-width', 2.5)
            .attr('stroke-linejoin', 'round')
            .attr('stroke-linecap', 'round')
            .attr('d', line(dataset));

          // add dots
          svg.selectAll('datadots')
            .data(dataset)
            .enter()
            .append('circle')
            .attr('fill', 'steelblue')
            .attr('r', 3.5)
            .attr('cx', d => x(d[0]))
            .attr('cy', d => y(d[1]));

          // tooltip
          const dot = svg.append('g')
            .attr('display', 'none');

          dot.append('circle')
            .attr('stroke', 'steelblue')
            .attr('r', 5);

          const text_x = width - marginRight*2;
          const text_y = marginTop*2;

          const box_w = 140;
          const box_h = 50;
          const box_margin = 20;

          const box = svg.append("rect")
            .style("fill", "white")
            .style("opacity", "0.5")
            .attr("x", text_x - box_w + box_margin)
            .attr("y", text_y - box_h + box_margin)
            .attr("width", box_w)
            .attr("height", box_h);
            //.attr('transform', 'translate(' + (text_x) + ',' + (text_y) + ')');

          const text = svg.append('text')
            .text('')
            .attr("fill", "currentColor")
            .attr("text-anchor", "end")
            .attr("class", "chart-tooltip")
            .attr('transform', 'translate(' + (text_x) + ',' + (text_y) + ')');

          var pointerenter = function() {
            dot.attr('display', null);
            text.attr('display', null);
            box.attr('display', null);
          };

          var mousemove = function(event) {
            // find closest point on line to cursor
            const [xm, ym] = d3.pointer(event);
            const i = d3.leastIndex(dataset, ([_x, _y]) => Math.hypot(x(_x) - xm, 0));
            const [_x, _y] = dataset[i];

            dot.attr('transform', 'translate(' + x(_x) + ',' + y(_y) + ')');
            text.text(_x + ': ' + DE.format('$.2f')(_y) );
            //svg.property('value', dataset[i]).dispatch('input', {bubbles: true});
          };

          var pointerleave = function() {
            dot.attr('display', 'none');
            text.attr('display', 'none');
            box.attr('display', 'none');
            //svg.node().value = null;
            //svg.dispatch('input', {bubbles: true});
          };

          svg.on('pointerenter', pointerenter)
            .on('pointerleave', pointerleave)
            .on('mousemove', mousemove)
            .on('touchstart', (e) => {e.preventDefault()});

          //return svg.node();
        },

        assembleEventProgram(event_id) {
          let cocktails = this.data.cocktails.filter((e) => e.event === event_id);
          let recipes = {
            cocktails: {},
            recipes: [],
          };

          collectRecipes = (recipe_list, recipe_collection, parent_index = null) => {
            recipe_list.forEach((item) => {
              if (!Array.isArray(item)) {
                recipe_collection[parent_index].ingredients.push({
                  unit:       item.unit,
                  amount:     item.amount,
                  color:      item.color,
                  id:         item.id,
                  name:       item.name,
                  type:       'ingredient',                  
                });
              } else {
                const recipe = {
                  unit:       item.recipe_info.unit,
                  amount:     item.recipe_info.amount,
                  color:      item.recipe_info.color,
                  id:         item.recipe_info.id,
                  name:       item.recipe_info.name,
                  notes:      item.recipe_info.notes,
                  type:       'recipe',
                  ingredients: [],
                };
                if (parent_index !== null) {
                  recipe_collection[parent_index].ingredients.push({...recipe});
                }
                recipe_collection.push({...recipe});
                collectRecipes(item, recipe_collection, recipe_collection.length - 1);
              }
            });
          };

          cocktails.forEach((cocktail) => {
            recipes.cocktails[cocktail.id] = [];
            c_recipes = [];
            let ingredients = JSON.parse(JSON.stringify(cocktail.ingredients.concat(cocktail.garnishes)));
            
            // build recipe
            recipe = this.assembleRecipe(ingredients);

            recipe.forEach((item) => {
              if (!Array.isArray(item)) {
                recipes.cocktails[cocktail.id].push({
                  unit:       item.unit,
                  amount:     item.amount * cocktail.numToPrep,
                  color:      item.color,
                  id:         item.id,
                  name:       item.name,
                  type:       'ingredient',                  
                });
              } else {
                recipes.cocktails[cocktail.id].push({
                  unit:       item.recipe_info.unit,
                  amount:     item.recipe_info.amount * cocktail.numToPrep,
                  color:      item.recipe_info.color,
                  id:         item.recipe_info.id,
                  name:       item.recipe_info.name,
                  notes:      item.recipe_info.notes,
                  type:       'recipe',
                });
              }
            });
            recipe = recipe.filter((item) => Array.isArray(item));            

            collectRecipes(recipe, c_recipes);
            // This creates a deep array, e. g. recipes in recipes contain a full list of their ingredients.
            // Workaround: delete the ingredient list when scaling the recipe.
            // TODO: let collectRecipes() create a flat array

            c_recipes.forEach((item) => {
              item.amount *= cocktail.numToPrep;
              item.raw_amount *= cocktail.numToPrep;
              
              item.ingredients.forEach((ingredient) => {
                ingredient.amount *= cocktail.numToPrep;
                ingredient.raw_amount *= cocktail.numToPrep;
                if (ingredient.type === 'recipe') { delete ingredient.ingredients };
              });
            });

            recipes.recipes.push(...c_recipes);
          });

          // deduplicate and sum
          let summedRecipes = [];
          let _recipes = Object.values(Object.groupBy(recipes.recipes, ({id}) => id));
          _recipes.forEach((recipe) => {
            let summedRecipe = {
              unit:        recipe[0].unit,
              amount:      recipe.reduce((acc, {amount}) => acc + +amount, 0),
              color:       recipe[0].color,
              id:          recipe[0].id,
              name:        recipe[0].name,
              type:        recipe[0].type,
              notes:       recipe[0].notes,
              ingredients: recipe.reduce((acc, {ingredients}) => acc.concat(ingredients), []), 
            };

            let summedIngredients = [];
            let ingredients = Object.values(Object.groupBy(summedRecipe.ingredients, ({id}) => id));
            ingredients.forEach((ingredient) => {
              summedIngredients.push({
                unit:        ingredient[0].unit,
                amount:      ingredient.reduce((acc, {amount}) => acc + +amount, 0),
                color:       ingredient[0].color,
                id:          ingredient[0].id,
                name:        ingredient[0].name,
                type:        ingredient[0].type,
              });
            });
            summedRecipe.ingredients = summedIngredients;
            summedRecipes.push(summedRecipe);
          });
          recipes.recipes = summedRecipes;

          return recipes;
        },

        init() {
          const stored = localStorage.getItem('barkeeper');

          if (stored) {
            this.data = JSON.parse(stored);
          }

          Alpine.directive(
            "destroy",
            (el, { expression }, { evaluateLater, cleanup }) => {
              const onDestroy = evaluateLater(expression);
              cleanup(onDestroy);
            }
          );

          Alpine.directive(
            "render",
            (el, { expression }, { evaluate }) => {
              evaluate(expression);
            }
          );

          Alpine.effect(() => {
            // Persist to local storage
            localStorage.setItem('barkeeper', JSON.stringify(this.data));

            // Update bar programs
            this.data.events.forEach((e) => {
              e.barProgram['recipes'] = this.assembleEventProgram(e.id);
            });

            // update charts
            Object.entries(this.charts).forEach(( [id, el]) => {
              this.createCocktailCostChart(el, this.calcCocktailCost(id));
            });
          })
        },
      });
    });    
  </script>

  <style>
    svg .axis{
      font-size: 0.8rem;
    }

    svg .chart-tooltip {
      font-weight: bold;
      font-size: 1.2rem;
    }

    body {
      background: #CCE7ED;
      background-image: linear-gradient(135deg, hsla(191, 48%, 86%, 1) 36%, hsla(288, 85%, 84%, 1) 96%);
    }

    canvas {
      width: 100%;
      height: auto;
    }

    h5 {
      margin-top: 0.3em;
      margin-bottom: 0.3em;
    }

    section {
      /* TODO: find a way to count siblings of template tag to limit number of columns to number of cards
               section:has(template:nth-child(1 of div)) does seem to brake with alpinejs :c */
      --column_min_width: min(30rem, 100%);  
      --column_max_width: 35rem;  
      --gap: 1rem;
      --column_count: max(1, round(down, 100cqw / (var(--gap) + var(--column_min_width))));
        
      position: relative;
      display: grid;
      container-name: grid_container;
      container-type: inline-size;
      

      gap: var(--gap); 
      grid-template-columns: repeat(auto-fill, minmax(var(--column_min_width), 1fr));

      max-width: calc(var(--column_max_width) * var(--column_count));
      margin-inline: auto;
    }

    section.double-width {
      --column_min_width: min(2 * 30rem, 100%);  
      --column_max_width: 2 * 35rem;  
      --gap: 1rem; 
      --column_count: max(1, round(down, 100cqw / (var(--gap) + var(--column_min_width))));
        
      position: relative;
      display: grid;
      container-name: grid_container;
      container-type: inline-size;
      

      gap: var(--gap); 
      grid-template-columns: repeat(auto-fill, minmax(var(--column_min_width), 1fr));

      max-width: calc(var(--column_max_width) * var(--column_count));
      margin-inline: auto;
    }

    section:has(template.cards-1) {
      --column_count: 1;
    }

    section:has(template.cards-2) {
      --column_count: min(2, max(1, round(down, 100cqw / (var(--gap) + var(--column_min_width)))));
    }

    section:has(template.cards-3) {
      --column_count: min(3, max(1, round(down, 100cqw / (var(--gap) + var(--column_min_width)))));
    }

    section:has(template.cards-4) {
      --column_count: min(4, max(1, round(down, 100cqw / (var(--gap) + var(--column_min_width)))));
    }

    section:has(template.cards-5) {
      --column_count: min(5, max(1, round(down, 100cqw / (var(--gap) + var(--column_min_width)))));
    }

    section:has(template.cards-6) {
      --column_count: min(6, max(1, round(down, 100cqw / (var(--gap) + var(--column_min_width)))));
    }

    section:has(template.cards-7) {
      --column_count: min(7, max(1, round(down, 100cqw / (var(--gap) + var(--column_min_width)))));
    }

    section:has(template.cards-8) {
      --column_count: min(8, max(1, round(down, 100cqw / (var(--gap) + var(--column_min_width)))));
    }

    #header {
      background-color: white;
    }

    .container {
      max-width: 100%;
    }

    .card-title {
      font-size: 2em;
      font-weight: bold;
    }

    .nav-tabs .nav-item.show .nav-link, .nav-tabs .nav-link.active {
      background-color: #CCE7ED;
      border-bottom-color: #CCE7ED;
    }

    .form-control, .form-select {
      border-width: 0px 0px 1px 0px;
    }

    .form-select:focus, .form-control:focus {
      box-shadow: none;
    } 

    .input-group-text {
      border-width: 0px 0px 1px 0px;
      /* background: transparent;
      font-weight: bold; */
    }

    .form-control.is-invalid {
      padding-right: 0.75rem;
      background-image: none;
    }

    .grid-table .row {
      border-bottom: 1px solid #ced4da;
      line-height: 1.5;
      padding: .375rem .75rem;
    }

    .grid-table-striped .row:nth-child(even of :not(.grid-table-block, .grid-table-heading)) {
      background-color: #f8f9fa;
    }

    .grid-table-heading {
      font-weight: 500;
      font-size: 1.25rem;
      background-color: #e9ecef;
      border-bottom-width: 4px !important;
    }

    .grid-table-heading > div:first-child {
      padding-left: 0 !important;
    }

    .grid-table-block {
      background-color: #fff !important;
    }

    .grid-table-block > div:first-child{
      padding: 0 !important;
    }

    .grid-table-highlight .pill {
      border-color: black;      
    }

    .grid-table .row:not(.grid-table-block, .grid-table-heading):hover {
      background-color: #fff3cd !important;
    }

    .grid-table-muted {
      color: #ced4da;
    }

    .grid-table-muted:before {
      content: "(";
    }

    .grid-table-muted:after {
      content: ")";
    }

    .pill {
      display: inline-block;
      border: 3px solid rgba(0, 0, 0, .1);
      border-radius: .5rem;
      padding: .1rem .35rem .1rem .35rem;
    }

  </style>

</head>
<body>
  <div
    x-data="{
      tabs: ['Ingredients', '⚙', ],
      activeTab: 'null',
      ideaTabStub: [{id: 'null', name: 'Ideas'}],
    }">

<!-- Navigation -->
    <div id="header">
      <h1>🥃 barkeeper</h1>
      <ul class="nav nav-tabs">
        <template x-for="event in $store.barkeeper.data.events.concat(ideaTabStub)" :key="event.id">
          <li
            @click="activeTab = event.id"
            class="nav-item">
            <a
              class="nav-link"
              :class="{ 'active': activeTab === event.id }"
              href="#"
              x-text="event.name"></a>
          </li>
        </template>
        <template x-for="tab in tabs">
          <li
            @click="activeTab = tab"
            class="nav-item">
            <a
              class="nav-link"
              :class="{ 'active': activeTab === tab }"
              href="#"
              x-text="tab"></a>
          </li>
        </template>
      </ul>
    </div>

<!-- Settings -->
  <template x-if="activeTab === '⚙'">
    <div class="container p-3">

      <div class="container mb-3">
        <button type="button" class="btn btn-primary" @click="$store.barkeeper.export()">⇩ export bar</button>
        <button type="button" class="btn btn-primary" @click="$store.barkeeper.import()">↺ import bar</button>
        <input type="file" id="import" style="display: none;">
      </div>
      
      <div class="card mb-3">
        <div class="card-header">
          Events
        </div>
        <div class="alert alert-warning m-3" role="alert">
          Warning: removing an event will move cocktails associated with that event to 'Ideas'!
        </div>
        <ul class="list-group list-group-flush">

          <template x-for="event in $store.barkeeper.data.events" :key="event.id">
            <li class="list-group-item">
              <div class="input-group">
                <input
                  type="text"
                  class="form-control p-1 m-0"
                  x-model="event.name">
                <button
                  type="button"
                  class="btn btn-outline-danger btn-xs m-0 p-1"
                  x-on:click="$store.barkeeper.removeEvent(event.id)">✗</button>
              </div>
            </li>
          </template>

          <li class="list-group-item" x-data="{newEvent: ''}">
            <div class="input-group">
              <input
                type="text"
                class="form-control p-1 m-0"
                x-model="newEvent"
                x-on:keyup.enter="if (newEvent !== '') {$store.barkeeper.addEvent(newEvent); newEvent = ''}">
              <button
                type="button"
                class="btn btn-outline-success btn-xs m-0 p-1"
                x-on:click="if (newEvent !== '') {$store.barkeeper.addEvent(newEvent); newEvent = ''}">✚</button>
            </div>
          </li>
        </ul>
      </div>

      <div class="card">
        <div class="card-header">
          Prep Methods
        </div>
        <ul class="list-group list-group-flush">
          <template x-for="method in $store.barkeeper.data.prepMethods">
            <li class="list-group-item">
              <div class="input-group">
                <input
                  type="text"
                  class="form-control p-1 m-0"
                  x-model="method">
                <button
                  type="button"
                  class="btn btn-outline-danger btn-xs m-0 p-1"
                  x-on:click="$store.barkeeper.removePrepMethod(method)">✗</button>
              </div>
            </li>
          </template>

          <li class="list-group-item" x-data="{newMethod: ''}">
            <div class="input-group">
              <input
                type="text"
                class="form-control p-1 m-0"
                x-model="newMethod"
                x-on:keyup.enter="if (newMethod !== '') {$store.barkeeper.data.prepMethods.push(newMethod); newMethod = ''}">
              <button
                type="button"
                class="btn btn-outline-success btn-xs m-0 p-1"
                x-on:click="if (newMethod !== '') {$store.barkeeper.data.prepMethods.push(newMethod); newMethod = ''}">✚</button>
            </div>
          </li>
        </ul>
      </div>

    </div>
  </template>

<!-- Cocktails -->
  <template x-if="$store.barkeeper.data.events.concat(ideaTabStub).some((e) => e.id === activeTab)">
    
    <div class="container p-3" x-data="{searchCocktails: ''}">

      <div class="input-group">
        <button
          type="button"
          class="btn btn-success"
          x-on:click="$store.barkeeper.addCocktail(searchCocktails, activeTab)">New Cocktail</button>
        <input 
          type="text"
          class="form-control"
          placeholder="search cocktails..." 
          x-model="searchCocktails">
      </div>

      <section>
        <template
          x-for="cocktail in $store.barkeeper.data.cocktails
          .filter((e) => e.event === activeTab)
          .filter((e) => e.name.toLowerCase().includes(searchCocktails.toLowerCase()))"
          :class="'cards-' + $store.barkeeper.data.cocktails
          .filter((e) => e.event === activeTab)
          .filter((e) => e.name.toLowerCase().includes(searchCocktails.toLowerCase())).length"
          :key="cocktail.id">
          <div>
            <div class="card shadow-sm rounded mt-3">

  <!-- Cocktails / Name -->
              <div class="card-header p-2">
                <input
                  type="text"
                  class="form-control card-title bg-transparent p-1 m-0"
                  style="font-size: 2em;"
                  x-model="cocktail.name">
              </div>

              <div class="card-body">

  <!-- Cocktails / Ingredients -->
                <label for="ingredients"><h5>Ingredients</h5></label>
                <div id="ingredients" class="row">

                  <template x-for="(c_ingredient, index) in cocktail.ingredients" :key="c_ingredient.id">
                    <div class="input-group mb-1">
                      <div class="col-2">
                        <template x-if="c_ingredient.id !== undefined">
                          <input
                            type="text"
                            class="form-control text-end"
                            :class="(isNaN(c_ingredient.amount) || c_ingredient.amount === '') ? 'is-invalid' : ''"
                            x-model="c_ingredient.amount">
                        </template>
                      </div>
                      
                      <div class="col-3">
                        <template x-if="c_ingredient.id !== undefined">
                          <select
                            class="form-select"
                            :class="c_ingredient.unit === '' ? 'is-invalid' : ''"
                            x-model="c_ingredient.unit">
                            <option></option>
                            <template x-for="unit in $store.barkeeper.getIngredientUnits(c_ingredient.id)">
                              <option
                                  x-bind:selected="c_ingredient.unit === unit"
                                  x-text="unit"/>
                            </template>
                          </select>
                        </template>
                      </div>

                      <div class="col-6">
                        <div class="dropdown" x-on:click="document.getElementById('ingredientSearch'+index).focus()">
                          <span
                            type="text"
                            class="form-select w-100"
                            data-bs-toggle="dropdown"
                            x-text="(c_ingredient.id === undefined) ? 'ingredient...' : $store.barkeeper.data.ingredients.find((e) => e.id === c_ingredient.id).name"
                          ></span>
                     
                          <ul class="dropdown-menu w-100" x-data="{searchString: ''}">
                            <input
                              type="text"
                              class="form-control"
                              :id="'ingredientSearch'+index"
                              name="search"
                              x-model="searchString">
                            <template
                              x-for="ingredient in $store.barkeeper.searchIngredient(searchString, excludeIdsArray = cocktail.ingredients.flatMap((e) => e.id))"
                              :key="ingredient.id">
                                <li><span
                                  class="dropdown-item"
                                  x-text="ingredient.name"
                                  x-on:click="c_ingredient.id = ingredient.id"></span></li>
                            </template>
                          </ul>
                        </div>
                    </div>
                    <div class="col-1">
                      <button
                        type="button"
                        class="btn btn-outline-danger btn-xs m-1 p-0 w-100"
                        x-on:click="cocktail.ingredients = cocktail.ingredients.filter((e) => e.id !== c_ingredient.id)">✗</button>
                    </div>
                  </template>

                  <div class="input-group justify-content-md-end" style="padding-right: 7px;">
                      <button
                        type="button"
                        class="btn btn-outline-success btn-xs col-1 m-1 p-0"
                    x-on:click="cocktail.ingredients.push({unit: '', amount: '', id: undefined})">✚</button>
                  </div>
                </div>

  <!-- Cocktails / Garnish -->
                <label for="garnish"><h5>Garnish</h5></label>
                <div id="garnish" class="row">

                  <template x-for="(c_garnish, index) in cocktail.garnishes" :key="c_garnish.id">
                    <div class="input-group mb-1">
                      <div class="col-2">
                        <template x-if="c_garnish.id !== undefined">
                          <input
                            type="text"
                            class="form-control text-end"
                            :class="(isNaN(c_garnish.amount) || c_garnish.amount === '') ? 'is-invalid' : ''"
                            x-model="c_garnish.amount">
                        </template>
                      </div>
                      
                      <div class="col-3">
                        <template x-if="c_garnish.id !== undefined">
                          <select
                            class="form-select"
                            :class="c_garnish.unit === '' ? 'is-invalid' : ''"
                            x-model="c_garnish.unit">
                            <option></option>
                            <template x-for="unit in $store.barkeeper.getIngredientUnits(c_garnish.id)">
                              <option
                                  x-bind:selected="c_garnish.unit === unit"
                                  x-text="unit" 
                              />
                            </template>
                          </select>
                        </template>
                      </div>

                      <div class="col-6">
                        <div class="dropdown" x-on:click="document.getElementById('ingredientSearch'+index).focus()">
                          <span
                            type="text"
                            class="form-select w-100"
                            data-bs-toggle="dropdown"
                            x-text="(c_garnish.id === undefined) ? 'ingredient...' : $store.barkeeper.data.ingredients.find((e) => e.id === c_garnish.id).name"
                          ></span>
                     
                          <ul class="dropdown-menu w-100" x-data="{searchString: ''}">
                            <input
                              type="text"
                              class="form-control"
                              :id="'ingredientSearch'+index"
                              name="search"
                              x-model="searchString">
                            <template x-for="ingredient in $store.barkeeper.searchIngredient(searchString, excludeIdsArray = cocktail.garnishes.flatMap((e) => e.id))"
                              :key="ingredient.id">
                                <li><span
                                  class="dropdown-item"
                                  x-text="ingredient.name"
                                  x-on:click="c_garnish.id = ingredient.id"></span></li>
                            </template>
                          </ul>
                        </div>
                    </div>
                    <div class="col-1">
                      <button
                        type="button"
                        class="btn btn-outline-danger btn-xs m-1 p-0 w-100"
                        x-on:click="cocktail.garnishes = cocktail.garnishes.filter((e) => e.id !== c_garnish.id)">✗</button>
                    </div>
                  </template>

                  <div class="input-group justify-content-md-end" style="padding-right: 7px;">
                      <button
                        type="button"
                        class="btn btn-outline-success btn-xs col-1 m-1 p-0"
                    x-on:click="cocktail.garnishes.push({unit: '', amount: '', id: undefined})">✚</button>
                  </div>
                </div>

  <!-- Cocktails / Notes -->
                <label for="notes"><h5>Notes</h5></label>
                <textarea
                  class="form-control mt-1 mb-1"
                  rows="5"
                  x-model="cocktail.notes"></textarea>

  <!-- Cocktails / Prep -->
                <label for="prep-method"><h5>Prep</h5></label>
                <div id="prep-method">

                  <div class="row mb-3">
                    <div class="col-12">  
                      <select class="form-select" x-model="cocktail.method">
                        <template x-for="method in $store.barkeeper.data.prepMethods">
                            <option
                                x-bind:selected="cocktail.method === method"
                                x-text="method" 
                            />
                        </template>
                      </select>
                    </div>
                  </div>

                  <div class="row">
                    <div class="col-3">
                      <div class="input-group">
                        <input
                          type="text"
                          size="2"
                          maxLength="2"
                          class="form-control text-end"
                          x-model="cocktail.cubes"
                          :class="(isNaN(cocktail.cubes) || cocktail.cubes === '') ? 'is-invalid' : ''">
                        <div class="input-group-append">
                          <span class="input-group-text">cubes</span>
                        </div>
                      </div>
                    </div>
                    <div class="col-4">
                      <div class="input-group">
                        <input
                          type="text"
                          size="2"
                          maxLength="2"
                          class="form-control text-end"
                          x-model="cocktail.largeCubes"
                          :class="(isNaN(cocktail.largeCubes) || cocktail.largeCubes === '') ? 'is-invalid' : ''">
                        <div class="input-group-append">
                          <span class="input-group-text">big cubes</span>
                        </div>
                      </div>
                    </div>
                    <div class="col-5">
                      <div class="input-group">
                        <input
                          type="text"
                          size="2"
                          maxLength="2"
                          class="form-control text-end"
                          x-model="cocktail.crushed"
                          :class="(isNaN(cocktail.crushed) || cocktail.crushed === '') ? 'is-invalid' : ''">
                        <div class="input-group-append">
                          <span class="input-group-text">scoops crushed</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <h5>Cost distribution</h5>
                <div
                  class="costDistChart"
                  style="width: 100%; height: 350px;"
                  x-render="() => { $store.barkeeper.createCocktailCostChart($el, $store.barkeeper.calcCocktailCost(cocktail.id)); $store.barkeeper.charts[cocktail.id] = $el; }"
                  x-destroy="() => { delete $store.barkeeper.charts[cocktail.id] }"></div>

                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text">Event:</span>
                  </div>
                  <select class="form-select" x-model="cocktail.event">
                    <template x-for="event in $store.barkeeper.data.events.concat(ideaTabStub)" :key="event.id">
                        <option
                            x-bind:selected="cocktail.event === event.id"
                            x-bind:value="event.id"
                            x-text="event.name" 
                        />
                    </template>
                  </select>
                </div>

                <div class="input-group mt-3">
                  <button
                    type="button"
                    class="btn btn-danger"
                    x-on:click="$store.barkeeper.removeCocktail(cocktail.id)">Remove</button>
                </div>

              </div>
            </div> <!-- /card -->
          </div>
        </template>
      </section>
        
    </div>
  </template>

<!-- Barprogram -->
  <template
    x-if="$store.barkeeper.data.events.some((e) => e.id === activeTab)">
    <div class="container p-3" x-data="{barProgram: $store.barkeeper.getEvent(activeTab).barProgram}">
      <section class="mt-3">
        <template
          x-for="cocktail in $store.barkeeper.data.cocktails.filter((e) => e.event === activeTab)"
          :class="'cards-' + $store.barkeeper.data.cocktails.filter((e) => e.event === activeTab).length"
          :key="cocktail.id">

          <div class="card shadow-sm rounded">
            <div class="card-header card-title p-2" x-text="cocktail.name">
            </div>

            <div class="card-body">

              <div class="row">
                <div class="col-3">
                  <div class="input-group">
                    <input
                      type="text"
                      class="form-control text-end"
                      x-model="cocktail.numToPrep"
                      :class="(isNaN(cocktail.numToPrep) || cocktail.numToPrep === '') ? 'is-invalid' : ''">
                    <div class="input-group-append">
                      <span class="input-group-text">pcs</span>
                    </div>
                  </div>
                </div>
                <div class="col-9">
                  <div class="input-group">
                    <input
                      type="text"
                      class="form-control text-end"
                      x-model="cocktail.price"
                      :class="(isNaN(cocktail.price) || cocktail.price === '') ? 'is-invalid' : ''">
                    <div class="input-group-append">
                      <span
                        class="input-group-text"
                        x-text="
                          '€/drink (ingredient cost: ' +
                          $store.barkeeper.formatCurrency($store.barkeeper.calcCocktailCost(cocktail.id, cocktail.numToPrep, cocktail.numToPrep)[0][1]) + ')'
                        "></span>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>

        </template>
      </section>

<!-- ice management -->
      <section class="double-width mt-3">

        <div class="card shadow-sm rounded">
          <div class="card-header card-title">Ice</div>

          <div class="card-body">
            
            <div class="row">
              <div class="col-3">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text">cube size</span>
                  </div>
                  <input
                    type="text"
                    class="form-control text-end"
                    x-model="barProgram.ice.cubeSize"
                    :class="(isNaN(barProgram.ice.cubeSize) || barProgram.ice.cubeSize === '') ? 'is-invalid' : ''">
                  <div class="input-group-append">
                    <span class="input-group-text">mm</span>
                  </div>
                </div>
              </div>
              <div class="col-2">
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control text-end"
                    x-model="barProgram.ice.cubeBagWeight"
                    :class="(isNaN(barProgram.ice.cubeBagWeight) || barProgram.ice.cubeBagWeight === '') ? 'is-invalid' : ''">
                  <div class="input-group-append">
                    <span class="input-group-text">kg/bag</span>
                  </div>
                </div>
              </div>
              <div class="col-2">
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control text-end"
                    x-model="barProgram.ice.cubeBagCost"
                    :class="(isNaN(barProgram.ice.cubeBagCost) || barProgram.ice.cubeBagCost === '') ? 'is-invalid' : ''">
                  <div class="input-group-append">
                    <span class="input-group-text">€/bag</span>
                  </div>
                </div>
              </div>

              <div class="col-2 text-end" style="padding: .375rem .75rem;">
                <span x-text="$store.barkeeper.getNumCubes(activeTab) + ' cubes'"></span>
              </div>
              <div class="col-1 text-end" style="padding: .375rem .75rem;">
                <span x-text="Math.ceil($store.barkeeper.getCubeWeight(activeTab)/barProgram.ice.cubeBagWeight) + ' bags'"></span>
              </div>
              <div class="col-2 text-end" style="padding: .375rem .75rem;">
                <span x-text="$store.barkeeper.formatNumber($store.barkeeper.getCubeWeight(activeTab)) + ' kg'"></span>
                <span class="grid-table-muted" x-text="Math.ceil($store.barkeeper.getCubeWeight(activeTab)/barProgram.ice.cubeBagWeight)*barProgram.ice.cubeBagWeight + ' kg'"></span>
              </div>
            </div>

            <div class="row mt-3">
              <div class="col-3">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text">scoop size</span>
                  </div>
                  <input
                    type="text"
                    class="form-control text-end"
                    x-model="barProgram.ice.scoopSize"
                    :class="(isNaN(barProgram.ice.scoopSize) || barProgram.ice.scoopSize === '') ? 'is-invalid' : ''">
                  <div class="input-group-append">
                    <span class="input-group-text">g</span>
                  </div>
                </div>
              </div>
              <div class="col-2">
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control text-end"
                    x-model="barProgram.ice.crushedBagWeight"
                    :class="(isNaN(barProgram.ice.crushedBagWeight) || barProgram.ice.crushedBagWeight === '') ? 'is-invalid' : ''">
                  <div class="input-group-append">
                    <span class="input-group-text">kg/bag</span>
                  </div>
                </div>
              </div>
              <div class="col-2">
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control text-end"
                    x-model="barProgram.ice.crushedBagCost"
                    :class="(isNaN(barProgram.ice.crushedBagCost) || barProgram.ice.crushedBagCost === '') ? 'is-invalid' : ''">
                  <div class="input-group-append">
                    <span class="input-group-text">€/bag</span>
                  </div>
                </div>
              </div>

              <div class="col-2 text-end" style="padding: .375rem .75rem;">
                <span x-text="$store.barkeeper.getNumScoops(activeTab) + ' scoops'"></span>
              </div>
              <div class="col-1 text-end" style="padding: .375rem .75rem;">
                <span x-text="Math.ceil($store.barkeeper.getCrushedWeight(activeTab)/barProgram.ice.crushedBagWeight) + ' bags'"></span>
              </div>
              <div class="col-2 text-end" style="padding: .375rem .75rem;">
                <span x-text="$store.barkeeper.formatNumber($store.barkeeper.getCrushedWeight(activeTab)) + ' kg'"></span>
                <span class="grid-table-muted" x-text="Math.ceil($store.barkeeper.getCrushedWeight(activeTab)/barProgram.ice.crushedBagWeight)*barProgram.ice.crushedBagWeight + ' kg'"></span>
              </div>
            </div>

            <div class="row mt-3">
              <div class="col-3">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text">cube size</span>
                  </div>
                  <input
                    type="text"
                    class="form-control text-end"
                    x-model="barProgram.ice.largeCubeSize"
                    :class="(isNaN(barProgram.ice.largeCubeSize) || barProgram.ice.largeCubeSize === '') ? 'is-invalid' : ''">
                  <div class="input-group-append">
                    <span class="input-group-text">mm</span>
                  </div>
                </div>
              </div>
              <div class="col-2">
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control text-end"
                    x-model="barProgram.ice.largeCubeCost"
                    :class="(isNaN(barProgram.ice.largeCubeCost) || barProgram.ice.largeCubeCost === '') ? 'is-invalid' : ''">
                  <div class="input-group-append">
                    <span class="input-group-text">€/pc</span>
                  </div>
                </div>
              </div>

              <div class="col-7 text-end" style="padding: .375rem .75rem;">
                <span x-text="$store.barkeeper.getNumLargeCubes(activeTab) + ' pcs'"></span>
                <span class="grid-table-muted" x-text="Math.ceil($store.barkeeper.getLargeCubeWeight(activeTab)) + ' kg'"></span>
              </div>
            </div>

          </div><!-- /card body -->

        </div><!-- /card -->

      </section>

<!-- equipmentlist -->
      <section class="double-width mt-3">

        <div class="card shadow-sm rounded">
          <div class="card-header card-title">Equipment</div>

          <div class="card-body">

            <div class="container grid-table grid-table-striped">
              <div>
                <div class="row grid-table-heading">
                  <div class="col-3">Name</div>
                  <div class="col-1">Quant.</div>
                  <div class="col-1">Price</div>
                  <div class="col-3">Source</div>
                  <div class="col-4">Comment</div>
                </div>

                <template x-for="item in barProgram.equipment">
                  <div class="row">
                    <div class="col-3 p-1">
                      <input
                        type="text"
                        class="form-control"
                        :class="(item.name === '') ? 'is-invalid' : ''"
                        x-model="item.name"
                      >
                    </div>
                    <div class="col-1 p-1">
                      <input
                        type="text"
                        class="form-control text-end"
                        :class="(isNaN(item.num) || item.num === '') ? 'is-invalid' : ''"
                        x-model="item.num"
                      >
                    </div>
                    <div class="col-1 p-1">
                      <div class="input-group">
                        <input
                          type="text"
                          class="form-control text-end input-group"
                          :class="(isNaN(item.price) || item.price === '') ? 'is-invalid' : ''"
                          x-model="item.price"
                        >
                        <span class="input-group-text">€</span>
                      </div>
                    </div>
                    <div class="col-3 p-1">
                      <input
                        type="text"
                        class="form-control"
                        x-model="item.source"
                      >
                    </div>
                    <div class="col-4 p-1">
                      <div class="input-group">
                        <input
                          type="text"
                          class="form-control"
                          x-model="item.comment"
                        >
                        <button
                          type="button"
                          class="btn btn-outline-danger btn-xs m-1 p-0"
                          x-on:click="barProgram.equipment = barProgram.equipment.filter((e) => JSON.stringify(e) !== JSON.stringify(item))">✗</button>
                      </div>
                    </div>
                  </div>
                </template>

              </div>
            </div>

            <div class="row mt-3">
              <div class="col-12">
                <button
                  type="button"
                  class="btn btn-outline-success btn-xs m-0 p-1 w-100"
                  x-on:click="barProgram.equipment.push({
                    name: '',
                    num: 0,
                    price: 0,
                    source: '',
                    comment: '',
                  })"
                >✚</button>
              </div>
            </div>

          </div>

        </div>

      </section>

<!-- recipes -->
      <section class="double-width mt-3">

        <div class="card shadow-sm rounded">
          <div class="card-header card-title">Cocktails</div>
          <div class="card-body">
            
            <div class="container grid-table grid-table-striped">
              <template x-for="cocktail in $store.barkeeper.data.cocktails.filter((e) => e.event === activeTab)" :key="cocktail.id">
                <div>
                  <div class="row grid-table-heading">
                    <div class="col-12" x-text="cocktail.name">
                    </div>
                  </div>

                  <template x-for="ingredient in $store.barkeeper.getEvent(activeTab).barProgram.recipes.cocktails[cocktail.id]" :key="ingredient.id">
                    <div class="row">
                      <div
                        class="col-7"
                        :class="(ingredient.type === 'recipe') ? 'grid-table-highlight' : ''"
                        >
                        <span class="pill" :style="'background-color: #' + $store.barkeeper.palette[ingredient.color] + ';'" x-text="ingredient.name"></span>
                      </div>
                      <div class="col-4 text-end">
                        <span x-text="$store.barkeeper.formatNumber(ingredient.amount)"></span>
                      </div>
                      <div
                        class="col-1"
                        x-text="ingredient.unit"
                        ></div>
                    </div>
                  </template>

                </div>
              </template>
            </div>

          </div>
        </div>
        
        <div class="card shadow-sm rounded">
          <div class="card-header card-title">Recipes</div>
          <div class="card-body">
            
            <div class="container grid-table grid-table-striped">
              <template x-for="recipe in $store.barkeeper.getEvent(activeTab).barProgram.recipes.recipes">
                <div>
                  <div class="row grid-table-heading" :style="'background-color: #' + $store.barkeeper.palette[recipe.color] + ';'">
                    <div
                      class="col-7"
                      x-text="recipe.name"
                      ></div>
                    <div class="col-4 text-end">
                      <span x-text="$store.barkeeper.formatNumber(recipe.amount)"></span>
                    </div>
                    <div
                      class="col-1"
                      x-text="recipe.unit"
                      ></div>
                  </div>
                  <div class="row grid-table-block">
                    <div
                      class="col-12"
                      x-text="recipe.notes"
                      ></div>
                  </div>

                  <template x-for="ingredient in recipe.ingredients">
                    <div class="row">
                      <div
                        class="col-7" :class="(ingredient.type === 'recipe') ? 'grid-table-highlight' : ''">
                          <span class="pill" :style="'background-color: #' + $store.barkeeper.palette[ingredient.color] + ';'" x-text="ingredient.name"></span>
                        </div>
                      <div class="col-4 text-end">
                        <span x-text="$store.barkeeper.formatNumber(ingredient.amount)"></span>
                      </div>
                      <div
                        class="col-1"
                        x-text="ingredient.unit"
                        ></div>
                    </div>
                  </template>

                </div>
              </template>
            </div>

          </div>
        </div>

      </section>
    </div>
  </template>

<!-- Ingredients -->
  <template x-if="activeTab === 'Ingredients'">

    <div class="container p-3" x-data="{searchIngredients: ''}">

      <div class="alert alert-warning" role="alert">
        Warning: removing an ingredient removes it from all cocktails and ingredients that have a recipe listing it!
      </div>

      <div class="input-group">
        <button
          type="button"
          class="btn btn-success"
          x-on:click="$store.barkeeper.addIngredient(searchIngredients)">New Ingredient</button>
          <input 
            type="text"
            class="form-control"
          placeholder="search ingredients..."
            x-model="searchIngredients">
      </div>

      <section class="mt-3">
        <template
          x-for="ingredient in $store.barkeeper.searchIngredient(searchIngredients)"
          :class="'cards-' + $store.barkeeper.searchIngredient(searchIngredients)"
          :key="ingredient.id">
          <div>
            <div
              class="card shadow-sm rounded"
              x-bind:style="(ingredient.ingredients.length === 0 && ingredient.sources.length === 0) ? 'border-color: red; border-width: 3px' : ''">

  <!-- Ingredients / Name -->
              <div class="card-header p-2">
                <input
                  type="text"
                  class="form-control card-title bg-transparent p-1 m-0"
                  style="font-size: 2em;"
                  x-model="ingredient.name">
              </div>

              <div class="card-body">

    <!-- Ingredients / misc -->
                <div class="row mb-3">
                  <div class="col-6">
                    <div class="input-group">
                      <div class="input-group-prepend">
                        <span class="input-group-text">Base unit</span>
                      </div>
                      <input
                        type="text"
                        class="form-control text-center"
                        x-model="ingredient.baseUnit">
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="input-group">
                      <div class="input-group-prepend">
                        <span class="input-group-text">Color</span>
                      </div>
                      <select
                        class="form-select color-picker"
                        :style="'background-color: #' + $store.barkeeper.palette[ingredient.color] + ';'"
                        x-model="ingredient.color">
                        <template x-for="(color, name) in $store.barkeeper.palette">
                          <option
                            :style="'background-color: #' + color + ';'"
                            x-bind:selected="ingredient.color === name"
                            x-text="name"/>
                        </template>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-6">
                    <div class="input-group">
                      <div class="input-group-prepend">
                        <span class="input-group-text">AbV</span>
                      </div>
                      <input
                        type="text"
                        class="form-control text-end"
                        x-model="ingredient.abv">
                      <div class="input-group-append">
                        <span class="input-group-text">%</span>
                      </div>
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="input-group">
                      <div class="input-group-prepend">
                        <span class="input-group-text">safety</span>
                      </div>
                      <input
                        type="text"
                        class="form-control text-end"
                        x-model="ingredient.safetyFactor">
                    </div>
                  </div>
                </div>

    <!-- Ingredients / unit conversion -->
                <label for="units"><h5>Conversion table</h5></label>
                <div id="units" class="row">

                  <template x-for="unit in ingredient.units">
                    <div class="input-group mb-1">
                      <div class="col-6">
                        <div class="input-group">
                          <div class="input-group-prepend">
                            <span class="input-group-text">1</span>
                          </div>
                          <input
                            type="text"
                            class="form-control text-center"
                            :class="(ingredient.units.filter((e) => e[0] === unit[0]).length !== 1 || unit[0] === '' || unit[0] === ingredient.baseUnit) ? 'is-invalid' : ''"
                            x-model="unit[0]">
                          <div class="input-group-append">
                            <span class="input-group-text">=</span>
                          </div>
                        </div>
                      </div>

                      <div class="col-5">
                        <div class="input-group">
                          <input
                              type="text"
                              class="form-control text-end"
                              :class="(isNaN(unit[1]) || unit[1] === '') ? 'is-invalid' : ''"
                              x-model="unit[1]">
                          <div class="input-group-append">
                            <span class="input-group-text" x-text="ingredient.baseUnit"></span>
                          </div>
                        </div>
                      </div>

                      <div class="col-1">
                        <button
                          type="button"
                          class="btn btn-outline-danger btn-xs m-1 p-0 w-100"
                          x-on:click="ingredient.units = ingredient.units.filter((e) => e[0] !== unit[0])">✗</button>
                      </div>
                    </div>
                  </template>

                  <div class="input-group justify-content-md-end" style="padding-right: 7px;">
                    <button
                      type="button"
                      class="btn btn-outline-success btn-xs col-1 m-1 p-0"
                      x-on:click="ingredient.units.push(['', 0])">✚</button>
                    </div>
                </div>

    <!-- Ingredients / sources -->
                <template x-if="ingredient.ingredients.length === 0">
                  <div>
                    
                    <label for="sources"><h5>Sources</h5></label>
                    <div id="sources" class="row">

                      <template x-for="source in ingredient.sources">
                        <div class="mb-1">

                          <div class="row">
                            <div class="col-11">
                              <input
                                type="text"
                                class="form-control"
                                placeholder="link/shop"
                                x-model="source.shopLink">
                            </div>
                            <div class="col-1">
                              <button
                                type="button"
                                class="btn btn-outline-danger btn-xs p-0 w-100"
                                x-on:click="ingredient.sources = ingredient.sources.filter((e) => JSON.stringify(e) !== JSON.stringify(source))">✗</button>
                            </div>
                          </div>

                          <div class="row mb-3">
                            <div class="col-6">
                              <div class="input-group">
                                <input
                                  type="text"
                                  class="form-control text-center"
                                  :class="(isNaN(source.size) || source.size === '') ? 'is-invalid' : ''"
                                  x-model="source.size">
                                <div class="input-group-append">
                                  <span class="input-group-text" x-text="ingredient.baseUnit"></span>
                                </div>
                              </div>
                            </div>

                            <div class="col-6">
                              <div class="input-group">
                                <input
                                    type="text"
                                    class="form-control text-end"
                                    :class="(isNaN(source.price) || source.price === '') ? 'is-invalid' : ''"
                                    x-model="source.price">
                                <div class="input-group-append">
                                  <span class="input-group-text">€</span>
                                </div>
                              </div>
                            </div>  
                          </div>
                          
                        </div>
                      </template>

                      <div class="input-group justify-content-md-end" style="padding-right: 7px;">
                        <button
                          type="button"
                          class="btn btn-outline-success btn-xs col-1 m-1 p-0"
                          x-on:click="ingredient.sources.push({size: 0, price: 0, shopLink: ''})">✚</button>
                      </div>
                    </div>

                  </div>  
                </template>

    <!-- Ingredients / ingredients -->
                <template x-if="ingredient.sources.length === 0">
                  <div>                      
                    <label for="ingredients"><h5>Ingredients</h5></label>
                    <div id="ingredients" class="row">

                      <template x-for="(i_ingredient, index) in ingredient.ingredients" :key="i_ingredient.id">
                        <div class="input-group mb-1">
                          <div class="col-2">
                            <template x-if="i_ingredient.id !== undefined">
                              <input
                                type="text"
                                class="form-control text-end"
                                :class="(isNaN(i_ingredient.amount) || i_ingredient.amount === '') ? 'is-invalid' : ''"
                                x-model="i_ingredient.amount">
                            </template>
                          </div>
                          
                          <div class="col-3">
                            <template x-if="i_ingredient.id !== undefined">
                              <select
                                class="form-select"
                                :class="i_ingredient.unit === '' ? 'is-invalid' : ''"
                                x-model="i_ingredient.unit">
                                <option></option>
                                <template x-for="unit in $store.barkeeper.getIngredientUnits(i_ingredient.id)">
                                  <option
                                      x-bind:selected="i_ingredient.unit === unit"
                                      x-text="unit"/>
                                </template>
                              </select>
                            </template>
                          </div>

                          <div class="col-6">
                            <div class="dropdown" x-on:click="document.getElementById('ingredientSearch'+index).focus()">
                              <span
                                type="text"
                                class="form-select w-100"
                                data-bs-toggle="dropdown"
                                x-text="(i_ingredient.id === undefined) ? 'ingredient...' : $store.barkeeper.data.ingredients.find((e) => e.id === i_ingredient.id).name"
                              ></span>
                         
                              <ul class="dropdown-menu w-100" x-data="{searchString: ''}">
                                <input
                                  type="text"
                                  class="form-control"
                                  :id="'ingredientSearch'+index"
                                  name="search"
                                  x-model="searchString">
                                <template x-for="ingredient in $store.barkeeper.searchIngredient(searchString, excludeIdsArray = [...ingredient.ingredients.flatMap((e) => e.id), ingredient.id])"
                                  :key="ingredient.id">
                                    <li><span
                                      class="dropdown-item"
                                      x-text="ingredient.name"
                                      x-on:click="i_ingredient.id = ingredient.id"></span></li>
                                </template>
                              </ul>
                            </div>
                        </div>
                        <div class="col-1">
                          <button
                            type="button"
                            class="btn btn-outline-danger btn-xs m-1 p-0 w-100"
                            x-on:click="ingredient.ingredients = ingredient.ingredients.filter((e) => e.id !== i_ingredient.id)">✗</button>
                        </div>
                      </template>

                      <div class="input-group justify-content-md-end" style="padding-right: 7px;">
                        <button
                          type="button"
                          class="btn btn-outline-success btn-xs col-1 m-1 p-0"
                          x-on:click="ingredient.ingredients.push({unit: '', amount: '', id: undefined})">✚</button>
                      </div>
                    </div>
                    <div class="input-group mt-3">
                      <div class="input-group-prepend">
                        <span class="input-group-text">Yield:</span>
                      </div>
                      <input
                        type="text"
                        class="form-control text-center"
                        x-model="ingredient.yield">
                      <div class="input-group-append">
                        <span class="input-group-text" x-text="ingredient.baseUnit"></span>
                      </div>
                    </div>
                  </div>
                </template>

    <!-- Ingredients / notes -->
                <label for="notes"><h5>Notes</h5></label>
                <textarea
                  id="notes"
                  class="form-control mt-1 mb-1"
                  rows="5"
                  x-model="ingredient.notes"></textarea>

    <!-- Ingredients / allergens -->
                <label for="allergens"><h5>Allergens</h5></label>
                <textarea
                  id="allergens"
                  class="form-control mt-1 mb-1"
                  rows="1"
                  x-model="ingredient.allergens"></textarea>

    <!-- Ingredients / vegan -->
                <label for="notes"><h5>Vegan</h5></label>
                <textarea
                  class="form-control mt-1 mb-1"
                  rows="1"
                  x-model="ingredient.vegan"></textarea>

                <div class="input-group mt-3">
                  <button
                    type="button"
                    class="btn btn-danger"
                    x-on:click="$store.barkeeper.removeIngredient(ingredient.id)">Remove</button>
                </div>

              </div>
            </div>
          </div>
        </template>

      </section>
    </div>
  </template>

  </div>
</body>
</html>
